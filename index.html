<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carolus Cahyo Echa — Coming Soon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #0d1117;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', 'Segoe UI', sans-serif;
    overflow: hidden;
    position: relative;
  }

  canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  .content {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 2rem;
    max-width: 600px;
  }

  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #427AB5;
    border: 1px solid rgba(66,122,181,0.4);
    background: rgba(66,122,181,0.10);
    padding: 6px 16px;
    border-radius: 20px;
    margin-bottom: 2rem;
  }

  h1 {
    font-size: clamp(2.5rem, 8vw, 4.5rem);
    font-weight: 700;
    color: #eef2f7;
    line-height: 1.1;
    margin-bottom: 1.25rem;
    letter-spacing: -0.02em;
  }

  h1 span {
    background: linear-gradient(135deg, #427AB5, #5B94CC, #7ab3e0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .desc {
    font-size: 16px;
    color: #5a7a99;
    line-height: 1.7;
    margin-bottom: 2.5rem;
    max-width: 420px;
    margin-left: auto;
    margin-right: auto;
  }

  .countdown {
    display: flex;
    gap: 20px;
    justify-content: center;
    margin-bottom: 3rem;
  }

  .unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .number {
    font-size: 2.5rem;
    font-weight: 500;
    color: #dce6f0;
    background: rgba(66,122,181,0.07);
    border: 1px solid rgba(66,122,181,0.18);
    border-radius: 12px;
    width: 76px;
    height: 76px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-variant-numeric: tabular-nums;
    transition: transform 0.1s;
  }

  .label {
    font-size: 10px;
    color: #3a5a78;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .social-btn:hover { border-color: rgba(66,122,181,0.5); color: #427AB5; }

  .social-btn svg { width: 16px; height: 16px; fill: currentColor; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div class="content">
  <div class="badge">Portfolio — Coming Soon</div>

  <h1>Something <span>awesome</span><br>is on its way.</h1>

  <p class="desc">Lagi dibangun dengan sepenuh hati. Segera hadir — stay tuned!</p>

<script>
// Particle canvas
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, particles = [];

function resize() {
  W = canvas.width = innerWidth;
  H = canvas.height = innerHeight;
}

function createParticles() {
  particles = Array.from({length: 80}, () => ({
    x: Math.random() * W,
    y: Math.random() * H,
    r: Math.random() * 1.5 + 0.3,
    dx: (Math.random() - 0.5) * 0.3,
    dy: (Math.random() - 0.5) * 0.3,
    o: Math.random() * 0.5 + 0.1
  }));
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(66,122,181,${p.o})`;
    ctx.fill();
    p.x += p.dx; p.y += p.dy;
    if (p.x < 0 || p.x > W) p.dx *= -1;
    if (p.y < 0 || p.y > H) p.dy *= -1;
  });

  // Draw connections
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 100) {
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = `rgba(66,122,181,${0.06 * (1 - dist/100)})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }

  requestAnimationFrame(draw);
}

resize();
createParticles();
draw();
window.addEventListener('resize', () => { resize(); createParticles(); });

// Countdown — target: 30 hari dari sekarang
const target = new Date(Date.now() + 30 * 24 * 60 * 60 * 1000);
function pad(n) { return String(n).padStart(2, '0'); }

function tick() {
  const now = new Date();
  const diff = Math.max(0, target - now);
  const days = Math.floor(diff / 86400000);
  const hrs  = Math.floor((diff % 86400000) / 3600000);
  const mins = Math.floor((diff % 3600000) / 60000);
  const secs = Math.floor((diff % 60000) / 1000);
  document.getElementById('d').textContent = pad(days);
  document.getElementById('h').textContent = pad(hrs);
  document.getElementById('m').textContent = pad(mins);
  document.getElementById('s').textContent = pad(secs);
}
tick();
setInterval(tick, 1000);

// Subscribe
function subscribe() {
  const val = document.getElementById('email').value;
  if (!val || !val.includes('@')) return;
  document.getElementById('form').style.display = 'none';
  document.getElementById('success').style.display = 'block';
}
</script>
</body>
</html>
