<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #0a0a0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: var(--font-sans, 'Segoe UI', sans-serif);
    overflow: hidden;
    position: relative;
  }

  canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  .content {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 2rem;
    max-width: 600px;
  }

  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #7c6fff;
    border: 1px solid rgba(124,111,255,0.4);
    background: rgba(124,111,255,0.08);
    padding: 6px 16px;
    border-radius: 20px;
    margin-bottom: 2rem;
  }

  h1 {
    font-size: clamp(2.5rem, 8vw, 4.5rem);
    font-weight: 500;
    color: #f0efe8;
    line-height: 1.1;
    margin-bottom: 1.25rem;
    letter-spacing: -0.02em;
  }

  h1 span {
    background: linear-gradient(135deg, #7c6fff, #a78bfa, #c084fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .desc {
    font-size: 16px;
    color: #888;
    line-height: 1.7;
    margin-bottom: 2.5rem;
    max-width: 420px;
    margin-left: auto;
    margin-right: auto;
  }

  .countdown {
    display: flex;
    gap: 20px;
    justify-content: center;
    margin-bottom: 3rem;
  }

  .unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .number {
    font-size: 2.5rem;
    font-weight: 500;
    color: #f0efe8;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    width: 76px;
    height: 76px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-variant-numeric: tabular-nums;
    transition: transform 0.1s;
  }

  .label {
    font-size: 10px;
    color: #555;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .notify-form {
    display: flex;
    gap: 10px;
    max-width: 360px;
    margin: 0 auto 2.5rem;
  }

  .notify-form input {
    flex: 1;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 12px 16px;
    color: #f0efe8;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .notify-form input:focus {
    border-color: rgba(124,111,255,0.5);
  }

  .notify-form input::placeholder { color: #555; }

  .notify-form button {
    background: #7c6fff;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 12px 20px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s, transform 0.1s;
  }

  .notify-form button:hover { background: #6b5eee; }
  .notify-form button:active { transform: scale(0.97); }

  .success-msg {
    display: none;
    font-size: 14px;
    color: #7c6fff;
    margin-bottom: 2.5rem;
  }

  .socials {
    display: flex;
    gap: 14px;
    justify-content: center;
  }

  .social-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 40px; height: 40px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.03);
    color: #888;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    text-decoration: none;
  }

  .social-btn:hover { border-color: rgba(124,111,255,0.5); color: #7c6fff; }

  .social-btn svg { width: 16px; height: 16px; fill: currentColor; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div class="content">
  <div class="badge">Portfolio — Coming Soon</div>

  <h1>Something <span>awesome</span><br>is on its way.</h1>

  <p class="desc">Lagi dibangun dengan sepenuh hati. Segera hadir — stay tuned!</p>

  <div class="countdown">
    <div class="unit"><div class="number" id="d">00</div><div class="label">Hari</div></div>
    <div class="unit"><div class="number" id="h">00</div><div class="label">Jam</div></div>
    <div class="unit"><div class="number" id="m">00</div><div class="label">Menit</div></div>
    <div class="unit"><div class="number" id="s">00</div><div class="label">Detik</div></div>
  </div>

  <div class="notify-form" id="form">
    <input type="email" id="email" placeholder="Email lo..." />
    <button onclick="subscribe()">Notify me</button>
  </div>
  <div class="success-msg" id="success">Sip! Gw kabarin kalau udah launch. 🎉</div>

  <div class="socials">
    <a class="social-btn" href="#" title="GitHub">

    </a>
    <a class="social-btn" href="#" title="LinkedIn">
      <svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>

    <a class="social-btn" href="#" title="Instagram">
      <svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
    </a>
  </div>
</div>

<script>
// Particle canvas
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, particles = [];

function resize() {
  W = canvas.width = innerWidth;
  H = canvas.height = innerHeight;
}

function createParticles() {
  particles = Array.from({length: 80}, () => ({
    x: Math.random() * W,
    y: Math.random() * H,
    r: Math.random() * 1.5 + 0.3,
    dx: (Math.random() - 0.5) * 0.3,
    dy: (Math.random() - 0.5) * 0.3,
    o: Math.random() * 0.5 + 0.1
  }));
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(124,111,255,${p.o})`;
    ctx.fill();
    p.x += p.dx; p.y += p.dy;
    if (p.x < 0 || p.x > W) p.dx *= -1;
    if (p.y < 0 || p.y > H) p.dy *= -1;
  });

  // Draw connections
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 100) {
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = `rgba(124,111,255,${0.06 * (1 - dist/100)})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }

  requestAnimationFrame(draw);
}

resize();
createParticles();
draw();
window.addEventListener('resize', () => { resize(); createParticles(); });

// Countdown — target: 30 hari dari sekarang
const target = new Date(Date.now() + 30 * 24 * 60 * 60 * 1000);
function pad(n) { return String(n).padStart(2, '0'); }

function tick() {
  const now = new Date();
  const diff = Math.max(0, target - now);
  const days = Math.floor(diff / 86400000);
  const hrs  = Math.floor((diff % 86400000) / 3600000);
  const mins = Math.floor((diff % 3600000) / 60000);
  const secs = Math.floor((diff % 60000) / 1000);
  document.getElementById('d').textContent = pad(days);
  document.getElementById('h').textContent = pad(hrs);
  document.getElementById('m').textContent = pad(mins);
  document.getElementById('s').textContent = pad(secs);
}
tick();
setInterval(tick, 1000);

// Subscribe
function subscribe() {
  const val = document.getElementById('email').value;
  if (!val || !val.includes('@')) return;
  document.getElementById('form').style.display = 'none';
  document.getElementById('success').style.display = 'block';
}
</script>
</body>
</html>
